<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>오늘의 행운자</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #06160c;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
}

section {
  min-height: 100vh;
  padding: 70px 28px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.clover {
  font-size: 86px;
  margin-bottom: 30px;
  animation: float 3s ease-in-out infinite;
}

h1 {
  font-size: 44px;
  margin: 0 0 30px;
  letter-spacing: -2px;
}

.seven {
  font-size: 150px;
  font-weight: 800;
  color: #80ff91;
  text-shadow: 0 0 25px #80ff91, 0 0 60px #80ff91;
  margin-bottom: 40px;
  animation: pulse 2s ease-in-out infinite;
}

.main-message {
  font-size: 24px;
  line-height: 1.7;
  word-break: keep-all;
  max-width: 330px;
}

.scroll-guide {
  margin-top: 50px;
  font-size: 15px;
  color: #9dffad;
  opacity: 0.8;
}

.message-card {
  width: 100%;
  max-width: 360px;
  padding: 34px 26px;
  border: 1px solid rgba(128, 255, 145, 0.35);
  border-radius: 24px;
  background: rgba(255, 255, 255, 0.04);
  box-shadow: 0 0 30px rgba(128, 255, 145, 0.12);
}

.message-title {
  font-size: 18px;
  color: #9dffad;
  margin-bottom: 24px;
}

.random-message {
  font-size: 26px;
  line-height: 1.7;
  word-break: keep-all;
}

.final-seven {
  font-size: 120px;
  color: #80ff91;
  text-shadow: 0 0 30px #80ff91;
}

.final-text {
  font-size: 24px;
  line-height: 1.7;
  max-width: 340px;
  word-break: keep-all;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.07); }
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-14px); }
}
</style>
</head>

<body>

<section>
  <div class="clover">🍀</div>
  <h1>오늘의 행운자</h1>
  <div class="seven">7</div>
  <div class="main-message" id="mainMessage"></div>
  <div class="scroll-guide">아래로 내려 오늘의 메시지를 받아보세요</div>
</section>

<section>
  <div class="message-card">
    <div class="message-title">오늘 당신에게 전하는 말</div>
    <div class="random-message" id="msg1"></div>
  </div>
</section>

<section>
  <div class="message-card">
    <div class="message-title">오늘의 행운</div>
    <div class="random-message" id="msg2"></div>
  </div>
</section>

<section>
  <div class="message-card">
    <div class="message-title">오늘의 응원</div>
    <div class="random-message" id="msg3"></div>
  </div>
</section>

<section>
  <div class="final-seven">7</div>
  <div class="final-text">
    사라졌던 행운은<br>
    오늘 당신에게 도착했습니다.
  </div>
</section>

<script>
const mainMessages = [
  "당신은 사라진 숫자 7을 발견했습니다.",
  "오늘의 행운은 당신에게 도착했습니다.",
  "당신이 찾던 행운이 여기에 있습니다."
];

const msg1List = [
  "조금 느려도 괜찮습니다. 당신은 충분히 잘 가고 있습니다.",
  "지금의 걸음도 분명 의미 있는 방향으로 향하고 있습니다.",
  "당신의 하루가 조용히 빛나기를 바랍니다.",
  "오늘은 스스로에게 조금 더 다정해져도 좋습니다.",
  "당신이 견뎌온 시간은 결코 사라지지 않습니다."
];

const msg2List = [
  "생각보다 좋은 일이 가까이에 있습니다.",
  "작은 우연이 오늘의 행운이 될 수 있습니다.",
  "기다리던 소식이 예상보다 빨리 올지도 모릅니다.",
  "오늘 만나는 순간들 속에 작은 선물이 숨어 있습니다.",
  "행운은 이미 당신 곁에 와 있습니다."
];

const msg3List = [
  "포기하지 않은 당신이 멋집니다.",
  "당신은 이미 충분한 사람입니다.",
  "오늘 하루도 잘 버텨냈습니다.",
  "스스로를 조금 더 믿어보세요.",
  "당신의 내일을 응원합니다."
];

function pick(list) {
  return list[Math.floor(Math.random() * list.length)];
}

document.getElementById("mainMessage").innerText = pick(mainMessages);
document.getElementById("msg1").innerText = pick(msg1List);
document.getElementById("msg2").innerText = pick(msg2List);
document.getElementById("msg3").innerText = pick(msg3List);
</script>

</body>
</html>
